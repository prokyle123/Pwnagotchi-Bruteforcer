<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
<title id="title">BruteForcer Mutator Lab</title>
<desc id="desc">Representative Mutator Lab page</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#07121f"/>
    <stop offset="100%" stop-color="#0a1726"/>
  </linearGradient>
  <style>
    .title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #e8f3ff; letter-spacing: .5px; }
    .sub { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #86a8c8; }
    .eyebrow { font: 700 14px 'Courier New', monospace; fill:#6fb6ff; letter-spacing:1.2px; }
    .value { font: 700 33px 'Courier New', monospace; fill:#eef6ff; }
    .small { font: 500 15px 'Courier New', monospace; fill:#a7c8e6; }
    .tiny { font: 500 13px 'Courier New', monospace; fill:#87a9ca; }
    .card { fill:#091827; stroke:#15405f; stroke-width:1.5; }
    .panel { fill:#071523; stroke:#1a496b; stroke-width:1.5; }
    .divider { stroke:#1d4e72; stroke-width:1; stroke-dasharray:3 5; opacity:.9; }
    .barbg { fill:#102338; }
    .blue { fill:#65baff; }
    .green { fill:#64df9a; }
    .yellow { fill:#f7c550; }
    .red { fill:#ff7581; }
  </style>
</defs>
<rect width="1600" height="920" fill="url(#bg)"/>
<rect x="0" y="0" width="1600" height="74" fill="#06101b"/>
<text x="52" y="46" class="title">Pwnagotchi BruteForcer</text>
<text x="422" y="45" class="sub">Command Center • local dashboard • port 5000</text>
<rect x="1370" y="22" width="178" height="32" rx="16" fill="#0e2b42" stroke="#2b6792"/>
<text x="1392" y="44" class="eyebrow">AUTHORIZED USE</text>

<text x="52" y="116" class="eyebrow">MUTATOR LAB</text>
<text x="52" y="155" class="title">Know what the candidate builder is doing — and what it costs.</text>
<text x="52" y="185" class="sub">Inspectable, capped, Pi-friendly generation with a live view of the configured feature mix.</text>

<g>
<rect x="52" y="226" width="480" height="594" rx="16" class="panel"/>
<text x="78" y="264" class="eyebrow">ACTIVE TUNING</text>
<text x="78" y="312" class="small">Strategy</text><text x="420" y="312" class="small">SMART</text>
<line x1="78" y1="326" x2="506" y2="326" class="divider"/>
<text x="78" y="362" class="small">Candidate cap</text><text x="417" y="362" class="small">800 / SSID</text>
<line x1="78" y1="376" x2="506" y2="376" class="divider"/>
<text x="78" y="412" class="small">Length filter</text><text x="398" y="412" class="small">8–63 chars</text>
<line x1="78" y1="426" x2="506" y2="426" class="divider"/>
<text x="78" y="462" class="small">Build estimate</text><text x="398" y="462" class="small">~3 sec</text>
<line x1="78" y1="476" x2="506" y2="476" class="divider"/>
<text x="78" y="512" class="small">Mutator pass</text><text x="380" y="512" class="small">~3 min @ 271 WPS</text>
<line x1="78" y1="526" x2="506" y2="526" class="divider"/>
<text x="78" y="562" class="small">Features</text>
<rect x="78" y="582" width="83" height="30" rx="15" fill="#12324d"/><text x="98" y="603" class="eyebrow">YEARS</text>
<rect x="174" y="582" width="75" height="30" rx="15" fill="#12324d"/><text x="192" y="603" class="eyebrow">SEPS</text>
<rect x="262" y="582" width="104" height="30" rx="15" fill="#12324d"/><text x="281" y="603" class="eyebrow">SSID SPLITS</text>
<rect x="78" y="626" width="98" height="30" rx="15" fill="#12324d"/><text x="96" y="647" class="eyebrow">LIGHT LEET</text>
<rect x="189" y="626" width="128" height="30" rx="15" fill="#12324d"/><text x="209" y="647" class="eyebrow">TOKEN PAIRS</text>
<line x1="78" y1="684" x2="506" y2="684" class="divider"/>
<text x="78" y="724" class="tiny">Built for visibility and predictable Pi workloads.</text>
</g>

<g>
<rect x="558" y="226" width="990" height="324" rx="16" class="panel"/>
<text x="586" y="264" class="eyebrow">CANDIDATE-FAMILY MIX · LAST BUILD: STARLINK</text>
<text x="586" y="306" class="small">Direct SSID forms</text><rect x="840" y="286" width="520" height="24" rx="12" class="barbg"/><rect x="840" y="286" width="444" height="24" rx="12" class="blue"/><text x="1382" y="306" class="small">356</text>
<text x="586" y="352" class="small">Compact suffixes</text><rect x="840" y="332" width="520" height="24" rx="12" class="barbg"/><rect x="840" y="332" width="266" height="24" rx="12" class="green"/><text x="1382" y="352" class="small">213</text>
<text x="586" y="398" class="small">Years + numeric tails</text><rect x="840" y="378" width="520" height="24" rx="12" class="barbg"/><rect x="840" y="378" width="186" height="24" rx="12" class="yellow"/><text x="1382" y="398" class="small">149</text>
<text x="586" y="444" class="small">Token pair variants</text><rect x="840" y="424" width="520" height="24" rx="12" class="barbg"/><rect x="840" y="424" width="102" height="24" rx="12" class="red"/><text x="1382" y="444" class="small">82</text>
<line x1="586" y1="478" x2="1518" y2="478" class="divider"/>
<text x="586" y="514" class="tiny">800 candidates generated · capped before it can take over the queue</text>
</g>

<g>
<rect x="558" y="576" width="990" height="244" rx="16" class="panel"/>
<text x="586" y="614" class="eyebrow">RECENT BUILD HISTORY</text>
<rect x="586" y="642" width="932" height="50" rx="10" fill="#0c2032"/>
<text x="608" y="673" class="small">STARLINK</text><text x="843" y="673" class="small">800 candidates</text><text x="1110" y="673" class="small">~2m 57s</text><text x="1352" y="673" class="small">smart</text>
<rect x="586" y="706" width="932" height="50" rx="10" fill="#091827"/>
<text x="608" y="737" class="small">Skynet</text><text x="843" y="737" class="small">716 candidates</text><text x="1110" y="737" class="small">~2m 38s</text><text x="1352" y="737" class="small">smart</text>
<text x="586" y="792" class="tiny">Inspect the budget, feature state, recent build size, and estimated workload before it runs.</text>
</g>

</svg>